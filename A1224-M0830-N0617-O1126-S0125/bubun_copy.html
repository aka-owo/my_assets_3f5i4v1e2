<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>Text Extractor 25 - Dual Pattern</title>
    <style>
        /* 嵐メンバーカラー（大人トーン：緑・紫・黄・赤・青） */
        :root {
            --color-green: #70A940;  
            --color-purple: #846E9D; 
            --color-yellow: #E6B101; /* メインカラー */
            --color-red: #CF5758;    
            --color-blue: #8AABCC;   
            
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2b2b2b;
            --text-sub: #6c757d;
            --border-color: #e9ecef;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 520px;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        h2 {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-main);
            margin: 0 0 35px 0;
            position: relative;
            padding-bottom: 15px;
        }

        h2::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 5px;
            background: linear-gradient(to right, 
                var(--color-green) 0% 20%, 
                var(--color-purple) 20% 40%, 
                var(--color-yellow) 40% 60%, 
                var(--color-red) 60% 80%, 
                var(--color-blue) 80% 100%
            );
        }

        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-group {
            flex: 1;
            margin-bottom: 15px;
        }

        .input-group.main-textarea {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 0.03em;
            margin-bottom: 8px;
        }

        .label-sub {
            color: #adb5bd;
            font-size: 0.7rem;
            margin-left: 5px;
        }

        input[type="text"], textarea {
            width: 100%;
            font-size: 16px; 
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background-color: #fcfcfc;
            color: var(--text-main);
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.25s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--color-yellow);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(224, 176, 52, 0.15);
        }

        textarea {
            height: 120px;
            resize: none;
        }

        .btn-main {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--color-yellow);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(224, 176, 52, 0.2);
            transition: all 0.2s ease;
        }

        .btn-main:active {
            transform: scale(0.98);
        }

        .result-section {
            margin-top: 30px;
            border-top: 1px dashed var(--border-color);
            padding-top: 25px;
        }

        .result-block {
            margin-bottom: 25px;
            display: none; 
        }

        .result-box {
            margin-top: 8px;
            padding: 14px 16px;
            background-color: #fbfbfb;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            min-height: 48px;
            max-height: 150px;
            overflow-y: auto;
            word-break: break-all;
            font-size: 15px;
            color: #495057;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .btn-copy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            padding: 8px 16px;
            background-color: #f1f3f5;
            color: #495057;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-copy:active {
            transform: scale(0.96);
        }

        .btn-copy.copied.btn-green  { background-color: var(--color-green);  color: #fff; }
        .btn-copy.copied.btn-purple { background-color: var(--color-purple); color: #fff; }
        .btn-copy.copied.btn-yellow { background-color: var(--color-yellow); color: #fff; }
        .btn-copy.copied.btn-red    { background-color: var(--color-red);   color: #fff; }
        .btn-copy.copied.btn-blue   { background-color: var(--color-blue);  color: #fff; }

    </style>
</head>
<body>

    <div class="container">
        <h2>TEXT EXTRACTOR</h2>

        <div class="input-row">
            <div class="input-group">
                <label for="startChar1">START 1<span class="label-sub">(基本)</span></label>
                <input type="text" id="startChar1" value="これから">
            </div>
            <div class="input-group">
                <label for="endChar1">END 1<span class="label-sub">(基本)</span></label>
                <input type="text" id="endChar1" value="ました。」">
            </div>
        </div>
        
        <div class="input-row">
            <div class="input-group">
                <label for="startChar2">START 2<span class="label-sub">(物語)</span></label>
                <input type="text" id="startChar2" value="## 物語">
            </div>
            <div class="input-group">
                <label for="endChar2">END 2<span class="label-sub">(終了文)</span></label>
                <input type="text" id="endChar2" value="返して】">
            </div>
        </div>

        <div class="input-group main-textarea">
            <label for="inputText">SOURCE TEXT</label>
            <textarea id="inputText" placeholder="ここにテキストを入力..."></textarea>
        </div>

        <button class="btn-main" onclick="extractAll()">テキストを解析・抽出する</button>

        <div class="result-section">
            <script>
                const colors = ['green', 'purple', 'yellow', 'red', 'blue'];
                let htmlStr = '';
                for (let i = 1; i <= 25; i++) {
                    const color = colors[(i - 1) % 5];
                    htmlStr += `
                    <div class="result-block" id="block${i}">
                        <label>RESULT ${i} (${i}箇所目)</label>
                        <div class="result-box" id="resultText${i}"></div>
                        <button class="btn-copy btn-${color}" id="copyBtn${i}" onclick="copyResult(${i})">✓ RESULT ${i} をコピー</button>
                    </div>`;
                }
                document.write(htmlStr);
            </script>
        </div>
    </div>

    <script>
        let extractedTexts = Array(26).fill("");

        function extractAll() {
            const text = document.getElementById('inputText').value;
            const start1 = document.getElementById('startChar1').value;
            const end1 = document.getElementById('endChar1').value;
            const start2 = document.getElementById('startChar2').value;
            const end2 = document.getElementById('endChar2').value;
            
            // 画面リセット
            for (let i = 1; i <= 25; i++) {
                const block = document.getElementById(`block${i}`);
                const resBox = document.getElementById(`resultText${i}`);
                const btn = document.getElementById(`copyBtn${i}`);
                
                if (block) block.style.display = "none";
                if (btn) resetBtn(btn, i);
                if (resBox) resBox.style.color = "var(--text-main)";
            }

            // 条件1の入力チェック（最低限、条件1が入っていれば動作）
            if (!text || !start1 || !end1) {
                const block1 = document.getElementById('block1');
                const resBox1 = document.getElementById('resultText1');
                if (block1 && resBox1) {
                    block1.style.display = "block";
                    resBox1.textContent = "Error: 入力欄（START 1 / END 1）が空欄です。";
                }
                return;
            }

            let currentPos = 0;

            for (let count = 1; count <= 25; count++) {
                const block = document.getElementById(`block${count}`);
                const resBox = document.getElementById(`resultText${count}`);
                if (!block || !resBox) break;

                // 2つの条件で現在の位置から一番近い「開始文字」を探す
                let startIdx1 = text.indexOf(start1, currentPos);
                let startIdx2 = (start2) ? text.indexOf(start2, currentPos) : -1;

                let usePattern = 0; // 1か2、見つからなければ0
                let startIdx = -1;
                let activeStart = "";
                let activeEnd = "";

                // どちらがより手前（最初）に現れるかを判定
                if (startIdx1 !== -1 && startIdx2 !== -1) {
                    if (startIdx1 <= startIdx2) {
                        usePattern = 1;
                        startIdx = startIdx1;
                    } else {
                        usePattern = 2;
                        startIdx = startIdx2;
                    }
                } else if (startIdx1 !== -1) {
                    usePattern = 1;
                    startIdx = startIdx1;
                } else if (startIdx2 !== -1) {
                    usePattern = 2;
                    startIdx = startIdx2;
                }

                // どちらの開始文字も見つからない場合
                if (usePattern === 0) {
                    if (count === 1) {
                        block.style.display = "block";
                        resBox.textContent = "Error: 開始文字が見つかりません。";
                        resBox.style.color = "var(--color-red)";
                    }
                    break;
                }

                // 使用するパターンの設定
                if (usePattern === 1) {
                    activeStart = start1;
                    activeEnd = end1;
                } else {
                    activeStart = start2;
                    activeEnd = end2;
                }
                
                const searchEndPos = startIdx + activeStart.length;
                const endIdx = text.indexOf(activeEnd, searchEndPos);

                // 終了文字が見つからない場合
                if (endIdx === -1) {
                    block.style.display = "block";
                    resBox.textContent = `Error: ${count}箇所目の終了文字（パターン${usePattern}）が見つかりません。`;
                    resBox.style.color = "var(--color-red)";
                    break;
                }
                
                const actualEnd = endIdx + activeEnd.length;
                
                extractedTexts[count] = text.substring(startIdx, actualEnd);
                resBox.textContent = extractedTexts[count];
                
                block.style.display = "block";
                currentPos = actualEnd; // 次の検索開始位置を更新
            }
        }

        function copyResult(num) {
            const textToCopy = extractedTexts[num];
            const btn = document.getElementById(`copyBtn${num}`);

            navigator.clipboard.writeText(textToCopy).then(() => {
                btn.classList.add('copied');
                btn.textContent = `✓ コピー完了！`;
                setTimeout(() => { resetBtn(btn, num); }, 2000);
            }).catch(err => {
                alert('Copy failed: ' + err);
            });
        }

        function resetBtn(btn, num) {
            btn.classList.remove('copied');
            btn.textContent = `✓ RESULT ${num} をコピー`;
        }
    </script>

</body>
</html>

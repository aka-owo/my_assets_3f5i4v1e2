<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>Text Extractor 25 - Color</title>
    <style>
        /* 嵐メンバーカラー（大人トーン：緑・紫・黄・赤・青） */
        :root {
            --color-green: #70A940;  
            --color-purple: #846E9D; 
            --color-yellow: #E6B101; /* メインカラー */
            --color-red: #CF5758;    
            --color-blue: #8AABCC;   
            
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2b2b2b;
            --text-sub: #6c757d;
            --border-color: #e9ecef;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 520px;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        h2 {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-main);
            margin: 0 0 35px 0;
            position: relative;
            padding-bottom: 15px;
        }

        h2::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 5px;
            background: linear-gradient(to right, 
                var(--color-green) 0% 20%, 
                var(--color-purple) 20% 40%, 
                var(--color-yellow) 40% 60%, 
                var(--color-red) 60% 80%, 
                var(--color-blue) 80% 100%
            );
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 0.03em;
            margin-bottom: 8px;
        }

        input[type="text"], textarea {
            width: 100%;
            font-size: 16px; 
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background-color: #fcfcfc;
            color: var(--text-main);
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.25s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--color-yellow);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(224, 176, 52, 0.15);
        }

        .main-textarea {
            margin-bottom: 20px;
        }
        textarea {
            height: 120px;
            resize: none;
        }

        .btn-main {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--color-yellow);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(224, 176, 52, 0.2);
            transition: all 0.2s ease;
        }

        .btn-main:active {
            transform: scale(0.98);
        }

        .result-section {
            margin-top: 30px;
            border-top: 1px dashed var(--border-color);
            padding-top: 25px;
        }

        .result-block {
            margin-bottom: 25px;
            display: none; 
        }

        .result-box {
            margin-top: 8px;
            padding: 14px 16px;
            background-color: #fbfbfb;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            min-height: 48px;
            max-height: 150px;
            overflow-y: auto;
            word-break: break-all;
            font-size: 15px;
            color: #495057;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* --- コピーボタンのベーススタイル --- */
        .btn-copy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            padding: 8px 16px;
            background-color: #f1f3f5;
            color: #495057;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-copy:active {
            transform: scale(0.96);
        }

        /* --- コピー完了時、それぞれの個別カラーを適用 --- */
        .btn-copy.copied.btn-green  { background-color: var(--color-green);  color: #fff; }
        .btn-copy.copied.btn-purple { background-color: var(--color-purple); color: #fff; }
        .btn-copy.copied.btn-yellow { background-color: var(--color-yellow); color: #fff; }
        .btn-copy.copied.btn-red    { background-color: var(--color-red);   color: #fff; }
        .btn-copy.copied.btn-blue   { background-color: var(--color-blue);  color: #fff; }

    </style>
</head>
<body>

    <div class="container">
        <h2>TEXT EXTRACTOR</h2>

        <div class="input-group">
            <label for="startChar">START</label>
            <input type="text" id="startChar" value="## 物語">
        </div>
        
        <div class="input-group">
            <label for="endChar">END</label>
            <input type="text" id="endChar" value="返して】">
        </div>

        <div class="main-textarea">
            <label for="inputText">SOURCE TEXT</label>
            <textarea id="inputText" placeholder="ここにテキストを入力..."></textarea>
        </div>

        <button class="btn-main" onclick="extractAll()">テキストを解析・抽出する</button>

        <div class="result-section">
            <div class="result-block" id="block1">
                <label>RESULT 1 (1箇所目)</label>
                <div class="result-box" id="resultText1"></div>
                <button class="btn-copy btn-green" id="copyBtn1" onclick="copyResult(1)">✓ RESULT 1 をコピー</button>
            </div>
            <div class="result-block" id="block2">
                <label>RESULT 2 (2箇所目)</label>
                <div class="result-box" id="resultText2"></div>
                <button class="btn-copy btn-purple" id="copyBtn2" onclick="copyResult(2)">✓ RESULT 2 をコピー</button>
            </div>
            <div class="result-block" id="block3">
                <label>RESULT 3 (3箇所目)</label>
                <div class="result-box" id="resultText3"></div>
                <button class="btn-copy btn-yellow" id="copyBtn3" onclick="copyResult(3)">✓ RESULT 3 をコピー</button>
            </div>
            <div class="result-block" id="block4">
                <label>RESULT 4 (4箇所目)</label>
                <div class="result-box" id="resultText4"></div>
                <button class="btn-copy btn-red" id="copyBtn4" onclick="copyResult(4)">✓ RESULT 4 をコピー</button>
            </div>
            <div class="result-block" id="block5">
                <label>RESULT 5 (5箇所目)</label>
                <div class="result-box" id="resultText5"></div>
                <button class="btn-copy btn-blue" id="copyBtn5" onclick="copyResult(5)">✓ RESULT 5 をコピー</button>
            </div>

            <div class="result-block" id="block6">
                <label>RESULT 6 (6箇所目)</label>
                <div class="result-box" id="resultText6"></div>
                <button class="btn-copy btn-green" id="copyBtn6" onclick="copyResult(6)">✓ RESULT 6 をコピー</button>
            </div>
            <div class="result-block" id="block7">
                <label>RESULT 7 (7箇所目)</label>
                <div class="result-box" id="resultText7"></div>
                <button class="btn-copy btn-purple" id="copyBtn7" onclick="copyResult(7)">✓ RESULT 7 をコピー</button>
            </div>
            <div class="result-block" id="block8">
                <label>RESULT 8 (8箇所目)</label>
                <div class="result-box" id="resultText8"></div>
                <button class="btn-copy btn-yellow" id="copyBtn8" onclick="copyResult(8)">✓ RESULT 8 をコピー</button>
            </div>
            <div class="result-block" id="block9">
                <label>RESULT 9 (9箇所目)</label>
                <div class="result-box" id="resultText9"></div>
                <button class="btn-copy btn-red" id="copyBtn9" onclick="copyResult(9)">✓ RESULT 9 をコピー</button>
            </div>
            <div class="result-block" id="block10">
                <label>RESULT 10 (10箇所目)</label>
                <div class="result-box" id="resultText10"></div>
                <button class="btn-copy btn-blue" id="copyBtn10" onclick="copyResult(10)">✓ RESULT 10 をコピー</button>
            </div>

            <div class="result-block" id="block11">
                <label>RESULT 11 (11箇所目)</label>
                <div class="result-box" id="resultText11"></div>
                <button class="btn-copy btn-green" id="copyBtn11" onclick="copyResult(11)">✓ RESULT 11 をコピー</button>
            </div>
            <div class="result-block" id="block12">
                <label>RESULT 12 (12箇所目)</label>
                <div class="result-box" id="resultText12"></div>
                <button class="btn-copy btn-purple" id="copyBtn12" onclick="copyResult(12)">✓ RESULT 12 をコピー</button>
            </div>
            <div class="result-block" id="block13">
                <label>RESULT 13 (13箇所目)</label>
                <div class="result-box" id="resultText13"></div>
                <button class="btn-copy btn-yellow" id="copyBtn13" onclick="copyResult(13)">✓ RESULT 13 をコピー</button>
            </div>
            <div class="result-block" id="block14">
                <label>RESULT 14 (14箇所目)</label>
                <div class="result-box" id="resultText14"></div>
                <button class="btn-copy btn-red" id="copyBtn14" onclick="copyResult(14)">✓ RESULT 14 をコピー</button>
            </div>
            <div class="result-block" id="block15">
                <label>RESULT 15 (15箇所目)</label>
                <div class="result-box" id="resultText15"></div>
                <button class="btn-copy btn-blue" id="copyBtn15" onclick="copyResult(15)">✓ RESULT 15 をコピー</button>
            </div>

            <div class="result-block" id="block16">
                <label>RESULT 16 (16箇所目)</label>
                <div class="result-box" id="resultText16"></div>
                <button class="btn-copy btn-green" id="copyBtn16" onclick="copyResult(16)">✓ RESULT 16 をコピー</button>
            </div>
            <div class="result-block" id="block17">
                <label>RESULT 17 (17箇所目)</label>
                <div class="result-box" id="resultText17"></div>
                <button class="btn-copy btn-purple" id="copyBtn17" onclick="copyResult(17)">✓ RESULT 17 をコピー</button>
            </div>
            <div class="result-block" id="block18">
                <label>RESULT 18 (18箇所目)</label>
                <div class="result-box" id="resultText18"></div>
                <button class="btn-copy btn-yellow" id="copyBtn18" onclick="copyResult(18)">✓ RESULT 18 をコピー</button>
            </div>
            <div class="result-block" id="block19">
                <label>RESULT 19 (19箇所目)</label>
                <div class="result-box" id="resultText19"></div>
                <button class="btn-copy btn-red" id="copyBtn19" onclick="copyResult(19)">✓ RESULT 19 をコピー</button>
            </div>
            <div class="result-block" id="block20">
                <label>RESULT 20 (20箇所目)</label>
                <div class="result-box" id="resultText20"></div>
                <button class="btn-copy btn-blue" id="copyBtn20" onclick="copyResult(20)">✓ RESULT 20 をコピー</button>
            </div>

            <div class="result-block" id="block21">
                <label>RESULT 21 (21箇所目)</label>
                <div class="result-box" id="resultText21"></div>
                <button class="btn-copy btn-green" id="copyBtn21" onclick="copyResult(21)">✓ RESULT 21 をコピー</button>
            </div>
            <div class="result-block" id="block22">
                <label>RESULT 22 (22箇所目)</label>
                <div class="result-box" id="resultText22"></div>
                <button class="btn-copy btn-purple" id="copyBtn22" onclick="copyResult(22)">✓ RESULT 22 をコピー</button>
            </div>
            <div class="result-block" id="block23">
                <label>RESULT 23 (23箇所目)</label>
                <div class="result-box" id="resultText23"></div>
                <button class="btn-copy btn-yellow" id="copyBtn23" onclick="copyResult(23)">✓ RESULT 23 をコピー</button>
            </div>
            <div class="result-block" id="block24">
                <label>RESULT 24 (24箇所目)</label>
                <div class="result-box" id="resultText24"></div>
                <button class="btn-copy btn-red" id="copyBtn24" onclick="copyResult(24)">✓ RESULT 24 をコピー</button>
            </div>
            <div class="result-block" id="block25">
                <label>RESULT 25 (25箇所目)</label>
                <div class="result-box" id="resultText25"></div>
                <button class="btn-copy btn-blue" id="copyBtn25" onclick="copyResult(25)">✓ RESULT 25 をコピー</button>
            </div>
        </div>
    </div>

    <script>
        // 25個分に対応（インデックス1〜25を使用するため、サイズ26で初期化）
        let extractedTexts = Array(26).fill("");

        function extractAll() {
            const text = document.getElementById('inputText').value;
            const start = document.getElementById('startChar').value;
            const end = document.getElementById('endChar').value;
            
            // 1〜25の全ブロックを一旦非表示＆リセット
            for (let i = 1; i <= 25; i++) {
                const block = document.getElementById(`block${i}`);
                const resBox = document.getElementById(`resultText${i}`);
                const btn = document.getElementById(`copyBtn${i}`);
                
                if (block) block.style.display = "none";
                if (btn) resetBtn(btn, i);
                if (resBox) resBox.style.color = "var(--text-main)";
            }

            // 入力チェック
            if (!text || !start || !end) {
                const block1 = document.getElementById('block1');
                const resBox1 = document.getElementById('resultText1');
                if (block1 && resBox1) {
                    block1.style.display = "block";
                    resBox1.textContent = "Error: 入力欄が空欄です。";
                }
                return;
            }

            let currentPos = 0;

            // 25箇所目までループ処理
            for (let count = 1; count <= 25; count++) {
                const block = document.getElementById(`block${count}`);
                const resBox = document.getElementById(`resultText${count}`);
                
                if (!block || !resBox) break;

                const startIdx = text.indexOf(start, currentPos);
                if (startIdx === -1) {
                    if (count === 1) {
                        block.style.display = "block";
                        resBox.textContent = "Error: 開始文字が見つかりません。";
                        resBox.style.color = "var(--color-red)";
                    }
                    break;
                }
                
                const searchEndPos = startIdx + start.length;
                const endIdx = text.indexOf(end, searchEndPos);
                if (endIdx === -1) {
                    block.style.display = "block";
                    resBox.textContent = `Error: ${count}箇所目の終了文字が見つかりません。`;
                    resBox.style.color = "var(--color-red)";
                    break;
                }
                
                const actualEnd = endIdx + end.length;
                
                extractedTexts[count] = text.substring(startIdx, actualEnd);
                resBox.textContent = extractedTexts[count];
                
                block.style.display = "block";
                currentPos = actualEnd;
            }
        }

        function copyResult(num) {
            const textToCopy = extractedTexts[num];
            const btn = document.getElementById(`copyBtn${num}`);

            navigator.clipboard.writeText(textToCopy).then(() => {
                btn.classList.add('copied');
                btn.textContent = `✓ コピー完了！`;
                
                setTimeout(() => {
                    resetBtn(btn, num);
                }, 2000);
            }).catch(err => {
                alert('Copy failed: ' + err);
            });
        }

        function resetBtn(btn, num) {
            btn.classList.remove('copied');
            btn.textContent = `✓ RESULT ${num} をコピー`;
        }
    </script>

</body>
</html>
